<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tempo" />
  <title>Tempo v5.8.25</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=5.8.25" />
</head>
<body id="body">
  <div id="ariaAnnouncer" class="sr-only" aria-live="assertive"></div>
  <div id="toast" class="toast" aria-live="polite"></div>

  <main class="app">
    <header class="brand-bar"><h1 class="brand-name">TEMPO <span id="syncBadge" class="sync-badge" aria-hidden="true"></span></h1></header>
    <section id="setup">
      <div class="dashboard">
        <div id="resumeCard" class="panel highlight hidden">
          <h3>Resume Workout</h3><h1 id="resumeName" class="text-high mb-sm">Active Session</h1>
          <div class="flex flex-row gap-sm mt-md"><button id="resumeBtn" class="primary flex-2" type="button">Resume</button><button id="dismissResumeBtn" class="secondary flex-1" type="button">Dismiss</button></div>
        </div>
        <div class="panel hero-panel"><h3>Active Routine</h3><h1 class="text-high">Ready to Move?</h1><p class="text-muted">High-performance core strength sessions with voice coaching and hands-free control.</p><button id="mainStartBtn" class="primary w-full mt-lg" type="button">Start Session</button></div>
        <div class="panel"><h3 class="mb-md">Controls</h3><div class="flex flex-col gap-sm"><button id="vaultBtn" class="secondary" type="button">Saved Routines</button><button id="builderBtn" class="secondary" type="button">Create Routine</button><button id="settingsBtn" class="secondary" type="button">Settings</button></div></div>
      </div>
    </section>

    <div id="workoutContainer" class="workout-container hidden w-full"><section id="workoutView"></section><div id="stickyControls" class="sticky-bar"><button id="skipBtn" class="secondary" type="button">Skip</button><button id="pauseBtn" class="primary" type="button">Pause</button><button id="endBtn" class="danger" type="button">End</button></div></div>

    <dialog id="previewDialog" class="overlay-panel text-center"><h2 id="previewTitle" class="text-high m-0">Preview</h2><div class="infoGrid mb-md"><div class="black-box"><b id="previewMovements">0</b><span>Moves</span></div><div class="black-box"><b id="previewTime">0m</b><span>Time</span></div></div><div id="previewList" class="black-box text-left text-muted mb-md preview-list"></div><div class="flex flex-row gap-sm mt-md"><button id="previewStartBtn" class="primary flex-2" type="button">Start Session</button><button id="previewBackBtn" class="secondary flex-1" type="button">Back</button></div></dialog>
    <dialog id="vaultDialog" class="overlay-panel"><h2>My Routines</h2><div id="vaultList" class="mb-md"></div><button id="closeVaultBtn" class="secondary w-full" type="button">Close Library</button></dialog>
    <dialog id="customDialog" class="overlay-panel"><h2>Create Routine</h2><input type="text" id="routineName" placeholder="Routine Name" class="mb-sm form-control" /><textarea id="customList" class="routine-editor" placeholder="e.g. Plank, 30, 10"></textarea><div id="routinePreview" class="black-box mt-sm mb-md text-muted small-text">Enter movements...</div><div class="flex flex-row gap-sm"><button id="btnSaveRoutine" class="primary flex-2" type="button" disabled>Save & Preview</button><button id="cancelBuilderBtn" class="secondary flex-1" type="button">Cancel</button></div></dialog>
    <dialog id="settingsDialog" class="overlay-panel"><h2>Settings</h2><div class="black-box mb-md"><label class="font-bold text-muted block mb-xs" for="audioProfile">Audio Profile</label><select id="audioProfile" class="mb-md form-control"><option value="full">Full (Voice + Chimes)</option><option value="voice">Voice Only</option><option value="sound">Sound Only</option><option value="silent">Silent</option></select><label class="font-bold text-muted block mb-xs" for="volumeControl">Sound Volume</label><input id="volumeControl" type="range" min="0" max="100" value="50" class="w-full mb-md" /><label class="font-bold text-muted block mb-xs" for="voicePromptsToggle">Voice Prompts</label><input id="voicePromptsToggle" type="checkbox" checked class="mb-md" /><label class="font-bold text-muted block mb-xs" for="voiceVolumeControl">Voice Volume</label><input id="voiceVolumeControl" type="range" min="0" max="100" value="50" class="w-full mb-md" /><label class="font-bold text-muted block mb-xs" for="voiceSelect">Voice</label><select id="voiceSelect" class="mb-md form-control"><option value="">Browser default voice</option></select><button id="previewVoiceBtn" class="secondary w-full" type="button">Preview Voice</button></div><button id="saveSettingsBtn" class="primary w-full" type="button">Save & Close</button></dialog>
    <dialog id="confirmDialog" class="overlay-panel text-center"><h2 class="text-danger">Exit Session?</h2><p id="confirmText" class="text-muted mb-lg">Progress will not be saved.</p><div class="flex flex-row gap-sm"><button id="confirmYesBtn" class="danger flex-1" type="button">Yes, End</button><button id="confirmCancelBtn" class="secondary flex-1" type="button">Cancel</button></div></dialog>
  </main>

  <script src="app.js?v=5.8.25" defer></script>
  <script src="patch-handlers.js?v=5.8.25" defer></script>
  <script src="audio-patch.js?v=5.8.25" defer></script>
</body>
</html>
